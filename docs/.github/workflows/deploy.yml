name: Deploy Databricks Bundle

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: "Target to deploy (dev or prod)"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

jobs:
  # ---------------------------------------------------------------------
  # Always validate on PRs and pushes - catches bundle/job config errors
  # before anything gets deployed.
  # ---------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle validate -t dev \
            --var="databricks_host=${DATABRICKS_HOST}"

  # ---------------------------------------------------------------------
  # Deploy to dev: push to develop branch, or manual dispatch
  # ---------------------------------------------------------------------
  deploy-dev:
    needs: validate
    if: >
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle deploy -t dev \
            --var="databricks_host=${DATABRICKS_HOST}" \
            --var="warehouse_id=${{ secrets.WAREHOUSE_ID_DEV }}" \
            --var="job_notification_email=${{ secrets.NOTIFY_EMAIL }}"

      - name: Run PL_Master_Load as a smoke test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: databricks bundle run pl_master_load -t dev

  # ---------------------------------------------------------------------
  # Deploy to prod: push to main only, or manual dispatch
  # ---------------------------------------------------------------------
  deploy-prod:
    needs: validate
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks bundle deploy -t prod \
            --var="databricks_host=${DATABRICKS_HOST}" \
            --var="warehouse_id=${{ secrets.WAREHOUSE_ID_PROD }}" \
            --var="job_notification_email=${{ secrets.NOTIFY_EMAIL }}"

        # Note: prod is NOT run automatically here - it deploys on the
        # UNPAUSED cron schedule defined in resources/aw_lakehouse_job.yml.
        # Trigger a manual run instead via:
        #   databricks bundle run pl_master_load -t prod
