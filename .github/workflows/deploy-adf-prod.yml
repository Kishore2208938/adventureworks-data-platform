name: Deploy Azure Data Factory

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Stop Triggers
      shell: pwsh
      run: |
        ./.github/scripts/PrePostDeploymentScript.ps1 `
        -armTemplate "ARMTemplate/ARMTemplateForFactory.json" `
        -ResourceGroupName "${{ secrets.RESOURCE_GROUP }}" `
        -DataFactoryName "${{ secrets.DATAFACTORY_NAME }}" `
        -predeployment $true `
        -deleteDeployment $false

    - name: Deploy ARM
      uses: Azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ secrets.RESOURCE_GROUP }}
        template: ARMTemplate/ARMTemplateForFactory.json
        parameters: ARMTemplate/ARMTemplateParametersForFactory.json

    - name: Start Triggers
      shell: pwsh
      run: |
        ./.github/scripts/PrePostDeploymentScript.ps1 `
        -armTemplate "ARMTemplate/ARMTemplateForFactory.json" `
        -ResourceGroupName "${{ secrets.RESOURCE_GROUP }}" `
        -DataFactoryName "${{ secrets.DATAFACTORY_NAME }}" `
        -predeployment $false `
        -deleteDeployment $true