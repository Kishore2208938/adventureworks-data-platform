name: Deploy Azure Data Factory

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        enable-AzPSSession: true
    - name: Stop Triggers
      shell: pwsh
      run: |
        ./.github/scripts/PrePostDeploymentScript.ps1 `
        -armTemplate "DEADFdev01/ARMTemplateForFactory.json" `
        -ArmTemplateParameters "DEADFdev01/ARMTemplateParametersForFactory.json"`
        -ArmTemplateParameters "DEADFdev01/ARMTemplateParametersForFactory.json"`
        -ResourceGroupName "${{ secrets.RESOURCE_GROUP }}" `
        -DataFactoryName "${{ secrets.DATAFACTORY_NAME }}" `
        -predeployment $true `
        -deleteDeployment $false

    - name: Deploy ARM
      uses: Azure/arm-deploy@v2
      with:
        resourceGroupName: ${{ secrets.RESOURCE_GROUP }}
        template: DEADFdev01/ARMTemplateForFactory.json
        parameters: deployment/environments/prod.parameters.json

    - name: Start Triggers
      shell: pwsh
      run: |
        ./.github/scripts/PrePostDeploymentScript.ps1 `
        -armTemplate "DEADFdev01/ARMTemplateForFactory.json" `
        -ResourceGroupName "${{ secrets.RESOURCE_GROUP }}" `
        -DataFactoryName "${{ secrets.DATAFACTORY_NAME }}" `
        -predeployment $false `
        -deleteDeployment $true
